spring:
  application:
    name: notification-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/notifications
    username: notify
    password: notify
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: notification-workers
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    listener:
      ack-mode: record
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: 8080

platform:
  kafka-topic: notifications
  dlq-topic: notifications.dlq
  max-retry-attempts: 3
  initial-backoff: 200ms
  backoff-multiplier: 2.0
  max-backoff: 5s
  visibility-timeout: 30s
  rate-limit-per-recipient: 100
  worker-batch-size: 20
  scheduler-fixed-delay: 1000ms
  retry-fixed-delay: 500ms
  provider:
    sms-webhook-url: http://localhost:8080/internal/providers/sms
    whatsapp-webhook-url: http://localhost:8080/internal/providers/whatsapp
    push-webhook-url: http://localhost:8080/internal/providers/push
    slack-webhook-url: http://localhost:8080/internal/providers/slack
  mail:
    from: noreply@notification-platform.local

logging:
  level:
    com.notificationplatform: INFO
    org.springframework.kafka: WARN
