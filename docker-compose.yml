services:
  postgres:
    image: postgres:16-alpine
    container_name: np-postgres
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify -d notifications"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - np_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: np-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: redpandadata/redpanda:v24.2.4
    container_name: np-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://localhost:9092
      - --pandaproxy-addr
      - 0.0.0.0:8082
      - --advertise-pandaproxy-addr
      - localhost:8082
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: np-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  np_pg_data:
